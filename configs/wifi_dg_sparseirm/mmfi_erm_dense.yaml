dataset_name: mmfi_wifi7
dataset_root: wifi_data/mmfi
model_family: mmfi_resnet
input_adapter: mmfi_tcsx
normalization_mode: train_global_scalar
auto_infer_num_classes: true
auto_infer_envs: true
nonfinite_policy: linear_interp

backbone_type: dense
penalty_type: none
method_name: erm_dense

epochs: 200
batch_size: 12
optimizer: adam
lr: 0.0003
weight_decay: 0.0001
lr_scheduler: cosine
warmup_epochs: 5

early_stopping_enabled: true
early_stopping_min_epochs: 60
early_stopping_patience: 40

penalty_weight: 0.0
penalty_anneal_epochs: 0
prune_rate: 0.0
dropout: 0.1

stem_channels: 32
stage_channels: [64, 128, 128]
stage_pool_kernels: [[2, 1], [2, 2], [2, 2]]
amp_enabled: true
grad_clip_norm: 1.0
